<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1200" height="630" fill="#f4f1ea"/>

  <!-- masthead bar -->
  <line x1="64" y1="86" x2="1136" y2="86" stroke="#1a1611" stroke-width="1.5"/>
  <g font-family="'IBM Plex Mono', monospace" font-size="15" letter-spacing="2" fill="rgba(26,22,17,.54)">
    <text x="64" y="68" fill="#1a1611">CHROMZY</text>
    <text x="520" y="68">GENERATIVE COLOUR PLATES</text>
    <text x="1136" y="68" text-anchor="end">EDITION OF 4,444 · SOLANA</text>
  </g>

  <!-- giant title -->
  <text x="58" y="358" font-size="196" font-weight="500" fill="#1a1611" letter-spacing="-5">Chromzy<tspan fill="#ce3a1f">.</tspan></text>

  <!-- lead -->
  <text x="64" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" fill="rgba(26,22,17,.82)">A finite suite of generative colour plates — no two alike.</text>

  <!-- bottom colophon -->
  <line x1="64" y1="556" x2="1136" y2="556" stroke="rgba(26,22,17,.20)" stroke-width="1"/>
  <g font-family="'IBM Plex Mono', monospace" font-size="15" letter-spacing="2" fill="rgba(26,22,17,.54)">
    <text x="64" y="592">MMXXVI</text>
    <text x="600" y="592" text-anchor="middle">1.5 SOL · AUTUMN 2026</text>
    <text x="1136" y="592" text-anchor="end">CHROMZY.COM</text>
  </g>

  <!-- plate motif, nested Albers fields -->
  <g transform="translate(980,142)">
    <rect width="156" height="120" fill="#cf8f3a"/>
    <rect x="14" y="11" width="128" height="78" fill="#9c5a3c"/>
    <rect x="28" y="22" width="100" height="46" fill="#3a3650"/>
    <rect x="42" y="33" width="72" height="24" fill="#1f37cc"/>
  </g>
</svg>
